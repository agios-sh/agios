<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AGI OS - Install</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
        max-width: 640px;
        margin: 80px auto;
        padding: 0 20px;
        color: #1a1a1a;
        background: #fafafa;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.25rem;
      }
      p {
        color: #555;
        line-height: 1.6;
      }
      code {
        background: #1a1a1a;
        color: #e0e0e0;
        padding: 12px 16px;
        border-radius: 6px;
        display: block;
        font-size: 0.9rem;
        overflow-x: auto;
        margin: 16px 0;
      }
      .label {
        color: #888;
        font-size: 0.85rem;
        margin-bottom: 4px;
      }
      a {
        color: #0066cc;
      }
    </style>
  </head>
  <body>
    <h1>AGI OS</h1>
    <p>The agent-native operating system.</p>

    <div class="label">macOS / Linux</div>
    <code>curl -fsSL https://agios.sh/install.sh | sh</code>

    <div class="label">Windows (PowerShell)</div>
    <code>irm https://agios.sh/install.ps1 | iex</code>

    <p>
      After installing, run <strong>agios init</strong> in your project
      directory to get started.
    </p>
    <p>
      <a href="https://github.com/agios-sh/agios">GitHub</a>
    </p>
  </body>
</html>
